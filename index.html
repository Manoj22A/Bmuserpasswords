<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database User Viewer for CURTAIN MATRIX.CO.UK</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            display: none;
        }

        table.show {
            display: table;
        }

        thead {
            background-color: #f8f9fa;
            border-bottom: 2px solid #667eea;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 14px;
        }

        .copy-value {
            display: inline-block;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-value:hover {
            color: #667eea;
            transform: translateY(-1px);
        }

        .copy-password {
            background-color: #f5f5f5;
            padding: 4px 8px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .no-records {
            text-align: center;
            padding: 40px;
            color: #999;
            font-style: italic;
            display: none;
        }

        .no-records.show {
            display: block;
        }

        .results {
            margin-top: 30px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-refresh {
            background-color: #667eea;
            color: white;
        }

        .btn-refresh:hover:not(:disabled) {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(234, 102, 102, 0.4);
        }

        .btn-refresh:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-clear {
            background-color: #6c757d;
            color: white;
        }

        .btn-clear:hover {
            background-color: #5a6268;
            transform: translateY(-2px);
        }

        .record-count {
            color: #666;
            font-size: 13px;
            margin-top: 10px;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            border-bottom: 2px solid #ddd;
        }

        .tab-button {
            padding: 12px 24px;
            border: none;
            background-color: #f5f5f5;
            color: #555;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            margin-bottom: -2px;
        }

        .tab-button:hover {
            background-color: #efefef;
        }

        .tab-button.active {
            background-color: #667eea;
            color: white;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: block;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .data-section {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .data-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }

            th, td {
                padding: 10px;
                font-size: 12px;
            }

            button {
                font-size: 12px;
                padding: 10px;
            }

            .tab-button {
                padding: 10px 16px;
                font-size: 12px;
            }

            .two-column {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Database User Viewer for CURTAINMATRIX.CO.UK</h1>

        <div id="successAlert" class="alert alert-success"></div>
        <div id="errorAlert" class="alert alert-error"></div>
        <div id="infoAlert" class="alert alert-info"></div>

        <!-- Database Selection (Global) -->
        <form id="databaseSelectionForm">
            <div class="form-group">
                <label for="database">Select Database:</label>
                <select id="database" name="database" required>
                    <option value="">-- Loading databases --</option>
                </select>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Loading data...</div>
        </div>

        <div class="two-column">
            <!-- Desktop Users Section -->
            <div class="data-section">
                <h3>Desktop Users</h3>
                <div class="button-group">
                    <button type="button" class="btn-refresh" id="refreshBtn">Refresh</button>
                    <button type="button" class="btn-clear" id="clearBtn">Clear</button>
                </div>

                <div class="results" id="results" style="display: none;">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Password</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                        </tbody>
                    </table>
                    <div class="no-records" id="noRecords">No records found in this database.</div>
                    <div class="record-count" id="recordCount"></div>
                </div>
            </div>

            <!-- Online Orders Section -->
            <div class="data-section">
                <h3>Online Orders</h3>
                <div class="button-group">
                    <button type="button" class="btn-refresh" id="refreshOnlineBtn">Refresh</button>
                    <button type="button" class="btn-clear" id="clearOnlineBtn">Clear</button>
                </div>

                <div class="results" id="onlineResults" style="display: none;">
                    <table id="onlineOrdersTable">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Password</th>
                            </tr>
                        </thead>
                        <tbody id="onlineOrdersTableBody">
                        </tbody>
                    </table>
                    <div class="no-records" id="onlineNoRecords">No records found in this database.</div>
                    <div class="record-count" id="onlineRecordCount"></div>
                </div>
            </div>
        </div>

    <script>
        $(document).ready(function() {
            // Load databases on page load
            loadDatabases();

            // Tab switching
            $('.tab-button').on('click', function() {
                var tabName = $(this).attr('data-tab');
                switchTab(tabName);
            });

            // When database is selected, load both users and online orders
            $('#database').on('change', function() {
                if ($(this).val()) {
                    clearResults();
                    clearOnlineResults();
                    loadUsers($(this).val());
                    loadOnlineOrders($(this).val());
                }
            });

            // Desktop Users tab
            $('#refreshBtn').on('click', function() {
                if ($('#database').val()) {
                    loadUsers($('#database').val());
                } else {
                    showAlert('error', 'Please select a database first.');
                }
            });

            $('#clearBtn').on('click', function() {
                clearResults();
            });

            // Online Orders tab
            $('#refreshOnlineBtn').on('click', function() {
                if ($('#database').val()) {
                    loadOnlineOrders($('#database').val());
                } else {
                    showAlert('error', 'Please select a database first.');
                }
            });

            $('#clearOnlineBtn').on('click', function() {
                clearOnlineResults();
            });

            $(document).on('click', '.copy-value', function() {
                var textToCopy = $(this).attr('data-copy-text') || '';
                var valueLabel = $(this).attr('data-copy-label') || 'Value';

                copyToClipboard(textToCopy)
                    .then(function() {
                        showAlert('success', valueLabel + ' copied to clipboard.');
                    })
                    .catch(function() {
                        showAlert('error', 'Unable to copy ' + valueLabel.toLowerCase() + '.');
                    });
            });
        });

        /**
         * Switch between tabs
         */
        function switchTab(tabName) {
            // Hide all tab contents
            $('.tab-content').removeClass('active');
            // Remove active class from all buttons
            $('.tab-button').removeClass('active');

            // Show selected tab content
            $('#' + tabName).addClass('active');
            // Add active class to clicked button
            $('.tab-button[data-tab="' + tabName + '"]').addClass('active');
        }

        /**
         * Load available databases
         */
        function loadDatabases() {
            showLoading(true);
            hideAllAlerts();

            $.ajax({
                url: '/api/databases',
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response.status === 'success') {
                        populateDatabaseDropdown(response.data);
                        showAlert('info', 'Databases loaded successfully. Select a database to view users.');
                    } else {
                        showAlert('error', response.message || 'Failed to load databases');
                    }
                },
                error: function(xhr, status, error) {
                    handleAjaxError(xhr);
                },
                complete: function() {
                    showLoading(false);
                }
            });
        }

        /**
         * Populate database dropdown
         */
        function populateDatabaseDropdown(databases) {
            var $select = $('#database');
            $select.empty();
            $select.append($('<option></option>').attr('value', '').text('-- Select a database --'));

            $.each(databases, function(index, db) {
                $select.append($('<option></option>').attr('value', db).text(db));
            });
        }

        /**
         * Load users from selected database
         */
        function loadUsers(database) {
            showLoading(true);
            hideAllAlerts();

            $.ajax({
                url: '/api/users',
                type: 'GET',
                data: { db: database },
                dataType: 'json',
                success: function(response) {
                    if (response.status === 'success') {
                        if (response.data && response.data.length > 0) {
                            displayUsers(response.data);
                            $('#results').show();
                        } else {
                            $('#results').show();
                            $('#noRecords').addClass('show');
                            showAlert('info', 'No records found in the bm_users table.');
                        }
                    } else {
                        showAlert('error', response.message || 'Failed to load users');
                    }
                },
                error: function(xhr, status, error) {
                    handleAjaxError(xhr);
                },
                complete: function() {
                    showLoading(false);
                }
            });
        }

        /**
         * Load online orders from selected database
         */
        function loadOnlineOrders(database) {
            showOnlineLoading(true);

            $.ajax({
                url: '/api/online-orders',
                type: 'GET',
                data: { db: database },
                dataType: 'json',
                success: function(response) {
                    if (response.status === 'success') {
                        if (response.data && response.data.length > 0) {
                            displayOnlineOrders(response.data);
                            $('#onlineResults').show();
                        } else {
                            $('#onlineResults').show();
                            $('#onlineNoRecords').addClass('show');
                        }
                    } else {
                        showAlert('error', response.message || 'Failed to load online orders');
                    }
                },
                error: function(xhr, status, error) {
                    handleAjaxError(xhr);
                },
                complete: function() {
                    showOnlineLoading(false);
                }
            });
        }

        /**
         * Display users in table
         */
        function displayUsers(users) {
            var $tbody = $('#usersTableBody');
            $tbody.empty();

            $.each(users, function(index, user) {
                var row = '<tr>' +
                    '<td><span class="copy-value" data-copy-label="Username" data-copy-text="' + escapeHtml(user.username || '') + '">' + escapeHtml(user.username || '') + '</span></td>' +
                    '<td><code class="copy-value copy-password" data-copy-label="Password" data-copy-text="' + escapeHtml(user.password || '') + '">' + escapeHtml(user.password || '') + '</code></td>' +
                    '</tr>';
                $tbody.append(row);
            });

            $('#usersTable').addClass('show');
            $('#noRecords').removeClass('show');
            $('#recordCount').text('Total records: ' + users.length);
        }

        /**
         * Display online orders in table
         */
        function displayOnlineOrders(orders) {
            var $tbody = $('#onlineOrdersTableBody');
            $tbody.empty();

            $.each(orders, function(index, order) {
                var row = '<tr>' +
                    '<td><span class="copy-value" data-copy-label="Username" data-copy-text="' + escapeHtml(order.cci_username || '') + '">' + escapeHtml(order.cci_username || '') + '</span></td>' +
                    '<td><code class="copy-value copy-password" data-copy-label="Password" data-copy-text="' + escapeHtml(order.cci_password || '') + '">' + escapeHtml(order.cci_password || '') + '</code></td>' +
                    '</tr>';
                $tbody.append(row);
            });

            $('#onlineOrdersTable').addClass('show');
            $('#onlineNoRecords').removeClass('show');
            $('#onlineRecordCount').text('Total records: ' + orders.length);
        }

        /**
         * Show/hide loading indicator
         */
        function showLoading(show) {
            if (show) {
                $('#loading').show();
            } else {
                $('#loading').hide();
            }
        }

        /**
         * Show/hide loading indicator for Online Orders
         */
        function showOnlineLoading(show) {
            if (show) {
                $('#onlineLoading').show();
            } else {
                $('#onlineLoading').hide();
            }
        }

        /**
         * Show alert message
         */
        function showAlert(type, message) {
            hideAllAlerts();
            var $alert = $('#' + type + 'Alert');
            $alert.text(message).show();
        }

        /**
         * Hide all alerts
         */
        function hideAllAlerts() {
            $('#successAlert').hide();
            $('#errorAlert').hide();
            $('#infoAlert').hide();
        }

        /**
         * Clear results
         */
        function clearResults() {
            $('#usersTable').removeClass('show');
            $('#usersTableBody').empty();
            $('#noRecords').removeClass('show');
            $('#recordCount').empty();
            $('#results').hide();
        }

        /**
         * Clear online orders results
         */
        function clearOnlineResults() {
            $('#onlineOrdersTable').removeClass('show');
            $('#onlineOrdersTableBody').empty();
            $('#onlineNoRecords').removeClass('show');
            $('#onlineRecordCount').empty();
            $('#onlineResults').hide();
        }

        /**
         * Handle AJAX errors
         */
        function handleAjaxError(xhr) {
            var message = 'An error occurred';

            if (xhr.status === 401) {
                message = 'Authentication failed. Please check your credentials.';
            } else if (xhr.status === 404) {
                message = 'Resource not found (404)';
            } else if (xhr.status === 500) {
                message = 'Server error (500). Please try again.';
            } else if (xhr.responseJSON && xhr.responseJSON.message) {
                message = xhr.responseJSON.message;
            } else if (xhr.statusText) {
                message = 'Error: ' + xhr.statusText;
            }

            showAlert('error', message);
        }

        /**
         * Escape HTML to prevent XSS
         */
        function escapeHtml(text) {
            if (!text) return '';
            return $('<div/>').text(text).html();
        }

        /**
         * Copy text to clipboard with fallback support
         */
        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            }

            return new Promise(function(resolve, reject) {
                var $temp = $('<textarea>')
                    .css({
                        position: 'fixed',
                        top: '-1000px',
                        left: '-1000px'
                    })
                    .val(text)
                    .appendTo('body');

                $temp.trigger('focus');
                $temp.trigger('select');

                try {
                    var successful = document.execCommand('copy');
                    $temp.remove();

                    if (successful) {
                        resolve();
                    } else {
                        reject();
                    }
                } catch (error) {
                    $temp.remove();
                    reject(error);
                }
            });
        }
    </script>
</body>
</html>
